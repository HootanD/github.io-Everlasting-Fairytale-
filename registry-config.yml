version: 0.1

log:
  level: info
  formatter: json

storage:
  filesystem:
    rootdirectory: /var/lib/registry

http:
  addr: 0.0.0.0:5000
  headers:
    X-Content-Type-Options:
      - nosniff

proxy:
  remoteurl: https://registry-1.docker.io
  ttl: 168h  # Cache layers for 7 days

cache:
  blobdescriptor: inmemory

health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 5
