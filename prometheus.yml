global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service: app

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (host metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # App stable instance
  - job_name: 'app-stable'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['app-stable:8080']
        labels:
          instance: stable
          deployment: production

  # App canary instance
  - job_name: 'app-canary'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['app-canary:8081']
        labels:
          instance: canary
          deployment: canary
