server:
  http_listen_port: 3200
  log_level: info

distributor:
  ring:
    kvstore:
      store: inmemory
  rate_limit_enabled: true
  rate_limit: 6000

ingester:
  lifecycler:
    ring:
      replication_factor: 1

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    compaction_window: 1h
    max_compaction_objects: 6000000
    block_retention: 24h
    compacted_block_retention: 10m
