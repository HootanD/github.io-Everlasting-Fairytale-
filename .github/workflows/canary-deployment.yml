name: Canary Deployment

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      canary_percentage:
        description: 'Traffic percentage for canary (1-50%)'
        required: false
        default: '10'
      canary_duration:
        description: 'Canary duration in minutes'
        required: false
        default: '5'
      auto_promote:
        description: 'Auto-promote canary to stable on success'
        required: false
        default: 'true'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  canary-check:
    name: Pre-Canary Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event_name == 'workflow_run')
    permissions:
      contents: read
    outputs:
      image-tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract image tag
        id: image
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=$SHA" >> $GITHUB_OUTPUT
          echo "🐳 Image tag: $SHA"

      - name: Verify image exists in registry
        run: |
          docker pull --quiet ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }} || {
            echo "❌ Image not found in registry"
            exit 1
          }
          echo "✓ Image verified in registry"

  canary-k8s:
    name: Canary Deployment (Kubernetes)
    runs-on: ubuntu-latest
    needs: canary-check
    if: success()
    permissions:
      contents: read
    environment:
      name: canary-k8s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create canary namespace
        run: |
          kubectl create namespace canary --dry-run=client -o yaml | kubectl apply -f -
          echo "✓ Canary namespace ready"

      - name: Deploy canary replica
        run: |
          cat << 'EOF' | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: node-app-canary
            namespace: canary
            labels:
              app: node-app
              version: canary
          spec:
            replicas: 1
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 1
                maxUnavailable: 0
            selector:
              matchLabels:
                app: node-app
                version: canary
            template:
              metadata:
                labels:
                  app: node-app
                  version: canary
                annotations:
                  prometheus.io/scrape: "true"
                  prometheus.io/port: "8080"
                  prometheus.io/path: "/metrics"
              spec:
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 1000
                containers:
                - name: node-app
                  image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.canary-check.outputs.image-tag }}
                  imagePullPolicy: Always
                  ports:
                  - name: http
                    containerPort: 8080
                  env:
                  - name: NODE_ENV
                    value: "production"
                  - name: PORT
                    value: "8080"
                  - name: DEPLOYMENT_VERSION
                    value: "canary"
                  resources:
                    requests:
                      cpu: 100m
                      memory: 128Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: http
                    initialDelaySeconds: 10
                    periodSeconds: 10
                    failureThreshold: 3
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: http
                    initialDelaySeconds: 5
                    periodSeconds: 5
                    failureThreshold: 2
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: node-app-canary
            namespace: canary
            labels:
              app: node-app
              version: canary
          spec:
            type: ClusterIP
            ports:
            - name: http
              port: 80
              targetPort: http
            selector:
              app: node-app
              version: canary
          EOF
          
          echo "✓ Canary deployment created"

      - name: Wait for canary readiness
        run: |
          kubectl rollout status deployment/node-app-canary -n canary --timeout=5m
          echo "✓ Canary pod is ready"

      - name: Run canary health checks
        run: |
          CANARY_POD=$(kubectl get pods -n canary -l version=canary -o jsonpath='{.items[0].metadata.name}')
          
          echo "🏥 Running health checks on canary pod: $CANARY_POD"
          
          # Port forward in background
          kubectl port-forward -n canary pod/$CANARY_POD 8080:8080 > /dev/null 2>&1 &
          PF_PID=$!
          sleep 2
          
          # Health check
          echo "Checking /health endpoint..."
          curl -f http://localhost:8080/health || exit 1
          echo "✓ /health check passed"
          
          # Ready check
          echo "Checking /ready endpoint..."
          curl -f http://localhost:8080/ready || exit 1
          echo "✓ /ready check passed"
          
          # Metrics endpoint
          echo "Checking /metrics endpoint..."
          curl -f http://localhost:8080/metrics > /dev/null || exit 1
          echo "✓ /metrics check passed"
          
          kill $PF_PID 2>/dev/null || true

  canary-vps:
    name: Canary Deployment (VPS)
    runs-on: ubuntu-latest
    needs: canary-check
    if: success()
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy canary on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            
            echo "🐳 Starting canary deployment on VPS..."
            
            # Login to registry
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Pull canary image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.canary-check.outputs.image-tag }}
            
            # Start canary service on port 8081
            export DOCKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.canary-check.outputs.image-tag }}"
            docker-compose -f docker-compose.prod.yml --profile canary up -d app-canary
            
            # Wait for startup
            sleep 3
            
            echo "✓ Canary container started on port 8081"
          EOF

      - name: Run canary health checks on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            
            echo "🏥 Running health checks on VPS canary..."
            
            for i in {1..5}; do
              if curl -f http://localhost:8081/health > /dev/null 2>&1; then
                echo "✓ Canary health check passed"
                break
              fi
              if [ $i -eq 5 ]; then
                echo "❌ Canary health check failed"
                exit 1
              fi
              echo "⏳ Retry $i/5..."
              sleep 2
            done
            
            curl -f http://localhost:8081/ready > /dev/null && echo "✓ Ready check passed" || true
            curl -f http://localhost:8081/metrics > /dev/null && echo "✓ Metrics endpoint OK" || true
          EOF

  canary-monitor:
    name: Monitor Canary (5 minutes)
    runs-on: ubuntu-latest
    needs: [canary-check, canary-k8s, canary-vps]
    if: success()
    permissions:
      contents: read

    steps:
      - name: Wait and monitor canary
        run: |
          DURATION=${{ github.event.inputs.canary_duration || 5 }}
          echo "⏱️ Monitoring canary for $DURATION minutes..."
          sleep $((DURATION * 60))
          echo "✓ Canary monitoring period complete"

      - name: Check canary metrics from Kubernetes
        run: |
          echo "📊 Canary metrics snapshot (K8s):"
          echo "Next: Check error rates and latencies in your monitoring stack"
          echo "  - Prometheus: http://your-k8s-prometheus:9090"
          echo "  - Jaeger: http://your-k8s-jaeger:16686"
          echo "  - Grafana dashboards"

      - name: Check canary metrics from VPS
        run: |
          echo "📊 Canary metrics snapshot (VPS):"
          echo "Next: Check error rates and latencies in your monitoring stack"
          echo "  - Prometheus: http://your-vps:9090"
          echo "  - Jaeger: http://your-vps:16686"

  canary-decision:
    name: Canary Success/Failure Decision
    runs-on: ubuntu-latest
    needs: [canary-check, canary-k8s, canary-vps, canary-monitor]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Determine canary outcome
        run: |
          if [ "${{ needs.canary-monitor.result }}" = "success" ]; then
            echo "status=✓ Canary monitoring passed" >> $GITHUB_ENV
            echo "should_promote=true" >> $GITHUB_ENV
          else
            echo "status=⚠ Canary monitoring failed or was cancelled" >> $GITHUB_ENV
            echo "should_promote=false" >> $GITHUB_ENV
          fi

      - name: Promote canary to stable
        if: env.should_promote == 'true' && (github.event.inputs.auto_promote != 'false' || github.event_name == 'workflow_run')
        run: |
          echo "🚀 Promoting canary to stable..."
          echo "This would trigger: docker tag canary latest && push to production"
          echo "Next: Implement automated promotion or manual approval gate"

      - name: Rollback canary on failure
        if: env.should_promote == 'false'
        run: |
          echo "⚠️ Canary monitoring indicated issues. Rollback initiated."
          echo "Actions:"
          echo "  • K8s: Scale down canary-app deployment"
          echo "  • VPS: docker-compose down app-canary"
          echo "  • Review logs and metrics before re-deploy"

  canary-cleanup:
    name: Cleanup Canary Resources
    runs-on: ubuntu-latest
    needs: [canary-check, canary-decision]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Cleanup K8s canary
        continue-on-error: true
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.ssh/kube_config
          chmod 600 ~/.kube/config
          
          echo "🧹 Cleaning up K8s canary resources (keeping for 1 hour for logs)..."
          echo "Later cleanup: kubectl delete namespace canary"

      - name: Cleanup VPS canary
        continue-on-error: true
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            echo "🧹 Canary resources available for 1 hour debug window"
            echo "To clean up: docker-compose -f docker-compose.prod.yml --profile canary down"
          EOF

  notify-canary-result:
    name: Notify Canary Result
    runs-on: ubuntu-latest
    needs: [canary-check, canary-decision]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Determine final status
        id: result
        run: |
          if [ "${{ needs.canary-decision.result }}" = "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "title=Canary Deployment Successful" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "title=Canary Deployment Failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "${{ steps.result.outputs.emoji }} ${{ steps.result.outputs.title }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.result.outputs.emoji }} ${{ steps.result.outputs.title }}*\nRepository: ${{ github.repository }}\nImage: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.canary-check.outputs.image-tag }}\nCommit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
